server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /oauth2/redirect {
        try_files $uri /index.html;
    }

    location /oauth2/error {
        try_files $uri /index.html;
    }
}
